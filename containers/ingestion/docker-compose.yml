services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: crypto_data
    ports:
      - "5432:5432"

  ingestion-app:
    build: .
    environment:
      DB_HOST: db
      PYTHONUNBUFFERED: 1
    depends_on:
      - db
