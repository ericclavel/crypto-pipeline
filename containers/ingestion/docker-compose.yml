services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ingestion-app:
    build: .
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DLQ_DIR: /app/data/dlq
      PYTHONUNBUFFERED: 1
    volumes:
      - ./data/dlq:/app/data/dlq
    depends_on:
      - db

  dbt-transform:
    build:
       context: .
       dockerfile: Dockerfile.dbt
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    volumes:
      # FIX: Point to the exact subfolder where dbt_project.yml lives
      - ../../transform/crypto_transformer:/usr/app/dbt_project
      - ~/.dbt:/root/.dbt
    profiles:
      - manual
    depends_on:
      - db

volumes:
  pgdata:                              # Ensures database data persists between downs
